name: 'Install Specialised Amulet-zlib'
description: 'Build, publish and install this library specialised for the installed compiler. Requires Python, build and twine.'
inputs:
  twine-username:
    description: 'The twine username'
  twine-password:
    description: 'The twine password'
  compiler-specifier:
    description: 'The PEP 440 version specifier for the compiler library'
  zlib-specifier:
    description: 'The PEP 440 version specifier for the zlib library'
outputs:
  version:
    description: "The version number of the installed library."
    value: ${{ steps.get-version.outputs.version }}
runs:
  using: "composite"
  steps:
    - name: Validate Inputs
      shell: bash
      run: |
        [ -z "${{ inputs.twine-username }}" ] && echo "Missing input: twine-username" && exit 1
        [ -z "${{ inputs.twine-password }}" ] && echo "Missing input: twine-password" && exit 1
        [ -z "${{ inputs.compiler-specifier }}" ] && echo "Missing input: compiler-specifier" && exit 1
        [ -z "${{ inputs.zlib-specifier }}" ] && echo "Missing input: zlib-specifier" && exit 1

    - name: Install Prebuilt
      id: install
      shell: bash
      continue-on-error: true
      run: |
        python -m pip install --only-binary amulet-zlib amulet-compiler-version${{ inputs.compiler-specifier }} amulet-zlib${{ inputs.zlib-specifier }}

    - name: Build
      if: steps.install.outcome == 'failure'
      shell: bash
      env:
        AMULET_FREEZE_COMPILER: 1
      run: |
        python -m build --wheel "${{ github.action_path }}"/../../..

    - name: Publish
      if: steps.install.outcome == 'failure'
      shell: bash
      env:
        TWINE_USERNAME: ${{ inputs.twine-username }}
        TWINE_PASSWORD: ${{ inputs.twine-password }}
      run: |
        twine upload "${{ github.action_path }}"/../../../dist/* --skip-existing

    - name: Install
      if: steps.install.outcome == 'failure'
      shell: bash
      run: |
        python -m pip install "${{ github.action_path }}"/../../../dist/amulet_zlib-*.whl

    - name: Get __version__
      id: get-version
      shell: bash
      run: |
        version=$(python -c "import amulet.zlib; print(amulet.zlib.__version__)")
        echo "version=$version" >> "$GITHUB_OUTPUT"
